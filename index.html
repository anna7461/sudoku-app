<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sudoku.js</title>
    <link rel="stylesheet" href="public/style.css">
    <script src="public/script.js" type="module"></script>
</head>

<body>
    <h1>Sudoku</h1>
    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
    </select>
    <div class="action-buttons-container">
        <button class="button" id="newGame">New Game</button>
        <button class="button" id="hintBtn">Get Hint</button>
        <button class="button" id="checkPuzzle">Check</button>
        <button class="button" id="toggleNotes">✏️ Notes: Off</button>
        <button class="button" id="resetNotes">🧹 Reset Notes</button>
        <button class="button" id="resetGame">🔄 Reset Game</button>
    </div>
    <p id="checkResult"></p>

    <div class="soduku-board"></div>

    <div class="notes-cell">
        <div class="notes-cell-header">
            <span>Notes</span>
            <button id="closeNotes">X</button>
        </div>
        <div class="notes-cell-content">
            <div class="notes-grid">
                <div class="notes-grid-row">
                    <div class="notes-grid  cell">1</div>
                    <div class="notes-grid  cell">2</div>           
                    <div class="notes-grid  cell">3</div>
                    <div class="notes-grid  
    cell">4</div>   
                    <div class="notes-grid cell">5</div>
                    <div class="notes-grid cell">6</div>
                    <div class="notes-grid  cell">7</div>
                    <div class="notes-grid cell">8</div>    
                    
            </div>
        </div>
    </div>

    <div id="dockBoard" class="dock-board"></div>
</body>

</html>
